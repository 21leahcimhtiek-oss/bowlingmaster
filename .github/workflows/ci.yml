name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Unity project structure
        run: |
          test -d Assets
          test -d Assets/Scripts
          test -d ProjectSettings
      - name: Validate docs and metadata
        run: |
          test -f README.md
          test -f LICENSE
          test -f COPYRIGHT
